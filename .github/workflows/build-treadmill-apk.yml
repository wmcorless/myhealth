name: Build Treadmill Bridge APK

on:
  push:
    branches: [main]
    paths:
      - 'treadmill-apk/**'
      - '.github/workflows/build-treadmill-apk.yml'
  pull_request:
    paths:
      - 'treadmill-apk/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Generate Gradle wrapper
        working-directory: treadmill-apk
        run: gradle wrapper --gradle-version=8.4

      - name: Build Debug APK
        working-directory: treadmill-apk
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          cp treadmill-apk/app/build/outputs/apk/debug/app-debug.apk \
             treadmill-apk/app/build/outputs/apk/debug/myhealth-bridge.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: myhealth-bridge-apk
          path: treadmill-apk/app/build/outputs/apk/debug/myhealth-bridge.apk
          retention-days: 90

      - name: Create or update GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: treadmill-bridge-latest
          name: MyHealth Treadmill Bridge
          body: |
            ## MyHealth Treadmill Bridge

            Sideload this APK onto your **NordicTrack X22i** console to stream
            live speed, incline, and heart rate to the **MyHealth** phone app via Bluetooth FTMS.

            ### Installation
            1. Enable developer mode on the treadmill console (tap white corner 10× → wait 7 s → tap 10×)
            2. Enable **USB debugging** in Developer Options
            3. Download `myhealth-bridge.apk` onto the treadmill via browser or USB flash drive
            4. Install the APK (Settings → Apps → allow Unknown Sources)
            5. Grant log permission from a PC on the same WiFi network:
               ```
               adb connect <treadmill-ip>:5555
               adb shell pm grant com.wmcorless.myhealth.bridge android.permission.READ_LOGS
               ```
            6. Open **MyHealth Bridge** on the treadmill and tap **Start Broadcasting**
            7. Open **MyHealth** on your phone → Preferences → Treadmill → Scan
          files: treadmill-apk/app/build/outputs/apk/debug/myhealth-bridge.apk
          make_latest: true
